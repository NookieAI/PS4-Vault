name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build Mac
        run: npx electron-builder --mac --publish never

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build Linux
        run: npx electron-builder --linux --publish never

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: dist/*.AppImage
