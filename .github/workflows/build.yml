name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Step 1: Create the GitHub release first so both build jobs
  # have a release to upload to — eliminates the race condition.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Mac
        run: npx electron-builder --mac --publish never

      - name: Upload Mac DMG
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.dmg

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux build deps
        run: sudo apt-get install -y rpm fakeroot

      - run: npm ci

      - name: Build Linux
        run: npx electron-builder --linux --publish never

      - name: Upload Linux AppImage
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.AppImage
